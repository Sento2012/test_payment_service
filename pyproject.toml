[tool.ruff]
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[tool.ruff.lint]
# E/W pycodestyle, F pyflakes, I isort, UP pyupgrade, B bugbear, SIM simplify, C4 comprehensions
select = ["E", "W", "F", "I", "UP", "B", "SIM", "C4"]

[tool.ruff.lint.isort]
# src-layout: первый-party пакеты лежат под src/ (PYTHONPATH=src)
known-first-party = [
    "config",
    "di",
    "infrastructure",
    "modules",
    "repository",
    "shared",
    "worker",
]

[tool.mypy]
python_version = "3.12"
mypy_path = "src"
files = ["src"]
explicit_package_bases = true
namespace_packages = true
ignore_missing_imports = true
check_untyped_defs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true

[tool.importlinter]
root_packages = [
    "config",
    "di",
    "infrastructure",
    "modules",
    "repository",
    "shared",
    "worker",
]
include_external_packages = true

# shared/* — самый нижний слой (порты + общие DTO): не зависит от приложения.
[[tool.importlinter.contracts]]
name = "shared не зависит от прикладных слоёв"
type = "forbidden"
source_modules = ["shared"]
forbidden_modules = ["infrastructure", "modules", "di", "worker", "repository", "config"]

# config — самодостаточен (его импортируют все, он — никого из приложения).
[[tool.importlinter.contracts]]
name = "config ни от чего прикладного не зависит"
type = "forbidden"
source_modules = ["config"]
forbidden_modules = ["infrastructure", "modules", "di", "worker", "repository", "shared"]

# Доменный слой не знает про presentation/composition root.
[[tool.importlinter.contracts]]
name = "Backend-домен не зависит от presentation/composition"
type = "forbidden"
source_modules = ["modules.Backend"]
forbidden_modules = ["di", "worker", "modules.Frontend"]
